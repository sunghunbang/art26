<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#f5f5f0; padding:24px 16px; min-height:100vh; }
  .wrap { max-width:720px; margin:0 auto; }
  h1 { font-size:16px; font-weight:600; color:#1a1a1a; margin-bottom:14px; padding-bottom:10px; border-bottom:1.5px solid #ddd; }

  /* 드로잉전 상단 배너 */
  .drawing-banner { display:flex; align-items:center; gap:10px; background:#CCF0F5; border:1px solid #00AACC; border-radius:8px; padding:9px 14px; margin-bottom:14px; }
  .drawing-banner .dbadge { background:#00AACC; color:#fff; font-size:10px; font-weight:600; border-radius:4px; padding:2px 7px; white-space:nowrap; flex-shrink:0; }
  .drawing-banner .dtext { font-size:11px; color:#005566; font-weight:600; }
  .drawing-banner .dsub { font-size:10px; color:#007A99; }

  /* 탭 */
  .tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .tab-btn { padding:7px 16px; border-radius:20px; font-size:12px; font-weight:600; border:1.5px solid; cursor:pointer; transition:all 0.15s; background:#fff; }
  .tab-btn.all    { color:#444; border-color:#bbb; }
  .tab-btn.all.active    { background:#444; color:#fff; border-color:#444; }
  .tab-btn.bangwa { color:#3B6D11; border-color:#97C459; }
  .tab-btn.bangwa.active { background:#3B6D11; color:#fff; border-color:#3B6D11; }
  .tab-btn.dongmun{ color:#5B1F8A; border-color:#9B59C8; }
  .tab-btn.dongmun.active{ background:#6A0DAD; color:#fff; border-color:#6A0DAD; }
  .tab-btn.yehon  { color:#0D5C52; border-color:#2BAA96; }
  .tab-btn.yehon.active  { background:#0D7A6A; color:#fff; border-color:#0D7A6A; }

  /* 범례 */
  .legend { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .legend span { display:inline-flex; align-items:center; gap:4px; font-size:11px; border-radius:4px; padding:3px 8px; border:0.5px solid; }

  /* 요약 */
  .summary { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .summary-box { flex:1; min-width:150px; border-radius:8px; padding:8px 12px; font-size:11px; border:0.5px solid; }
  .summary-box .title { font-weight:600; margin-bottom:3px; }

  /* 달력 */
  .cal-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .month-box { background:#fff; border:0.5px solid #ddd; border-radius:10px; overflow:hidden; }
  .month-header { padding:8px 12px; border-bottom:0.5px solid #ddd; font-size:13px; font-weight:600; color:#1a1a1a; }
  .day-labels { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:0.5px solid #eee; }
  .day-label { text-align:center; padding:4px 1px; font-size:10px; color:#888; }
  .day-label.sat { color:#378ADD; }
  .day-label.sun { color:#E24B4A; }
  .cells { display:grid; grid-template-columns:repeat(7,1fr); }
  .cell { padding:3px 2px; min-height:52px; border:0.5px solid #eee; display:flex; flex-direction:column; align-items:center; transition:opacity 0.2s; }
  .cell.empty { opacity:0.15; background:#f9f9f9; }
  .cell.dimmed { opacity:0.15; filter:grayscale(0.6); }
  .cell .num { font-size:11px; line-height:1.4; color:#1a1a1a; }
  .cell .num.sat { color:#378ADD; }
  .cell .num.sun { color:#E24B4A; }
  .cell .num.bold { font-weight:600; }
  .cell .lbl { font-size:8.5px; text-align:center; line-height:1.2; margin-top:2px; word-break:keep-all; letter-spacing:-0.2px; }

  /* 색상 */
  .t-holiday   { background:#FCEBEB; border-color:#F09595!important; }
  .t-holiday .num,.t-holiday .lbl { color:#993C1D; }
  .t-closure   { background:#FAEEDA; border-color:#EF9F27!important; }
  .t-closure .num,.t-closure .lbl { color:#854F0B; }
  .t-exam      { background:#EEEDFE; border-color:#AFA9EC!important; }
  .t-exam .num,.t-exam .lbl { color:#534AB7; }
  .t-exam2     { background:#D8D5FB; border-color:#8B84E8!important; }
  .t-exam2 .num,.t-exam2 .lbl { color:#2D24A0; font-weight:600; }
  .t-partial   { background:#E6F1FB; border-color:#85B7EB!important; }
  .t-partial .num,.t-partial .lbl { color:#185FA5; }
  .t-bangwa-off{ background:#E6F1FB; border-color:#85B7EB!important; }
  .t-bangwa-off .num,.t-bangwa-off .lbl { color:#185FA5; }
  .t-range1    { background:#EAF3DE; border-color:#C0DD97!important; }
  .t-range1 .num,.t-range1 .lbl { color:#3B6D11; }
  .t-range2    { background:#E1F5EE; border-color:#9FE1CB!important; }
  .t-range2 .num,.t-range2 .lbl { color:#0F6E56; }
  .t-start1    { background:#3B6D11; border-color:#3B6D11!important; }
  .t-start1 .num,.t-start1 .lbl { color:#fff; font-weight:600; }
  .t-end1      { background:#3B6D11; border-color:#3B6D11!important; }
  .t-end1 .num,.t-end1 .lbl { color:#fff; font-weight:600; }
  .t-start2    { background:#F5C518; border-color:#D4A000!important; }
  .t-start2 .num,.t-start2 .lbl { color:#4a3000; font-weight:600; }
  .t-end2      { background:#F5C518; border-color:#D4A000!important; }
  .t-end2 .num,.t-end2 .lbl { color:#4a3000; font-weight:600; }
  /* 동문전 — 보라 */
  .t-dongmun-install { background:#EDE0F5; border-color:#9B59C8!important; }
  .t-dongmun-install .num,.t-dongmun-install .lbl { color:#5B1F8A; font-weight:600; }
  .t-dongmun-open    { background:#6A0DAD; border-color:#4A007A!important; }
  .t-dongmun-open .num,.t-dongmun-open .lbl { color:#fff; font-weight:600; }
  .t-dongmun         { background:#F3EAFC; border-color:#B07DD6!important; }
  .t-dongmun .num,.t-dongmun .lbl { color:#6B2FA0; }
  .t-dongmun-remove  { background:#D8C4EE; border-color:#7B3FAF!important; }
  .t-dongmun-remove .num,.t-dongmun-remove .lbl { color:#3D1060; font-weight:600; }
  /* 예혼전 — 청록 */
  .t-yehon-install { background:#D0F0EC; border-color:#2BAA96!important; }
  .t-yehon-install .num,.t-yehon-install .lbl { color:#0D5C52; font-weight:600; }
  .t-yehon-open    { background:#0D7A6A; border-color:#085549!important; }
  .t-yehon-open .num,.t-yehon-open .lbl { color:#fff; font-weight:600; }
  .t-yehon-workshop{ background:#B8EDE7; border-color:#3CC4B0!important; }
  .t-yehon-workshop .num,.t-yehon-workshop .lbl { color:#0A4A42; font-weight:600; }
  /* 학교 전체 행사 — 앰버 */
  .t-school-event  { background:#FFF5CC; border-color:#F0C000!important; }
  .t-school-event .num,.t-school-event .lbl { color:#7A5000; font-weight:600; }

  /* 세부 일정 */
  .detail-section { margin-top:14px; background:#fff; border-radius:10px; border:0.5px solid #ddd; overflow:hidden; }
  .detail-header  { padding:8px 14px; font-size:12px; font-weight:600; border-bottom:0.5px solid #eee; }
  .detail-list    { padding:8px 0; }
  .detail-item    { display:flex; gap:10px; padding:6px 14px; border-bottom:0.5px solid #f0f0f0; align-items:flex-start; }
  .detail-item:last-child { border-bottom:none; }
  .detail-date    { font-size:11px; font-weight:600; white-space:nowrap; min-width:80px; color:#555; }
  .detail-dot     { width:8px; height:8px; border-radius:50%; margin-top:3px; flex-shrink:0; }
  .detail-text    { font-size:11px; color:#333; line-height:1.5; }
  .detail-sub     { font-size:10px; color:#888; margin-top:1px; }

  @media(max-width:500px){ .cal-grid{grid-template-columns:1fr;} .summary{flex-direction:column;} }
  .footer { margin-top:14px; font-size:10px; color:#aaa; text-align:right; }
</style>

function ds(y,m,d){ return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }

function getCellClass(key){
  const ev = events[key];
  if(ev) return 't-'+ev.type;
  if(key>='2026-05-06'&&key<='2026-07-16') return 't-range1';
  if(key>='2026-07-22'&&key<='2026-08-11') return 't-range2';
  return '';
}

function isRelevant(key,tab){
  if(tab==='all') return true;
  const ev=events[key];
  if(ev&&ev.tags&&ev.tags.includes(tab)) return true;
  if(tab==='bangwa'){
    if(key>='2026-05-06'&&key<='2026-07-16') return true;
    if(key>='2026-07-22'&&key<='2026-08-11') return true;
  }
  return false;
}

const specialTypes=['holiday','closure','exam','exam2','partial','bangwa-off','start1','end1','start2','end2','yehon-install','yehon-open','yehon-workshop','dongmun-install','dongmun-open','dongmun-remove','school-event'];

function renderMonth(y,m,tab){
  var fd=new Date(y,m-1,1).getDay(), dim=new Date(y,m,0).getDate();
  var h='<div class="month-box">';
  h+='<div class="month-header">'+y+'년 '+MONTHS[m]+'</div>';
  h+='<div class="day-labels">';
  DAYS.forEach(function(d,i){ h+='<div class="day-label'+(i===6?' sat':i===0?' sun':'')+'">'+d+'</div>'; });
  h+='</div><div class="cells">';
  for(var i=0;i<fd;i++) h+='<div class="cell empty"></div>';
  for(var d=1;d<=dim;d++){
    var key=ds(y,m,d), dow=(fd+d-1)%7, ev=events[key];
    var cls=getCellClass(key), rel=isRelevant(key,tab);
    var isSat=dow===6, isSun=dow===0;
    var numCls=!cls?(isSat?'sat':isSun?'sun':''):'bold';
    var hasSpecial=ev&&specialTypes.indexOf(ev.type)>=0;
    var wbg=!hasSpecial&&rel?(isSat?'background:#EEF5FC;':isSun?'background:#FEF0F0;':''):'';
    h+='<div class="cell'+(cls?' '+cls:'')+(rel?'':' dimmed')+'" style="'+wbg+'">';
    h+='<span class="num'+(numCls?' '+numCls:'')+'">'+d+'</span>';
    if(ev&&rel){
      h+='<span class="lbl">'+ev.label+'</span>';
      if(ev.sub)  h+='<span class="lbl" style="color:#7A5000;">'+ev.sub+'</span>';
      if(ev.sub2) h+='<span class="lbl">'+ev.sub2+'</span>';
      if(ev.sub3) h+='<span class="lbl" style="color:#7A5000;">'+ev.sub3+'</span>';
    }
    h+='</div>';
  }
  var rem=(7-((fd+dim)%7))%7;
  for(var i=0;i<rem;i++) h+='<div class="cell empty"></div>';
  h+='</div></div>';
  return h;
}

function renderLegend(tab){
  return (legends[tab]||[]).map(function(l){
    return '<span style="background:'+l.bg+';color:'+l.color+';border-color:'+l.border+';">'+l.text+'</span>';
  }).join('');
}

function renderDetail(tab){
  var items=tabDetails[tab]; if(!items||!items.length) return '';
  var hdr={all:'전체 주요 일정',bangwa:'방과후 주요 일정',dongmun:'동문전 · 선배와의 대화 일정',yehon:'예혼전 일정'};
  var hcol={all:'#444',bangwa:'#3B6D11',dongmun:'#5B1F8A',yehon:'#0D5C52'};
  var hbg={all:'#f7f7f7',bangwa:'#EAF3DE',dongmun:'#F3EAFC',yehon:'#D0F0EC'};
  var h='<div class="detail-section">';
  h+='<div class="detail-header" style="background:'+hbg[tab]+';color:'+hcol[tab]+';">'+hdr[tab]+'</div>';
  h+='<div class="detail-list">';
  items.forEach(function(item){
    h+='<div class="detail-item">';
    h+='<div class="detail-date">'+item.date+'</div>';
    h+='<div class="detail-dot" style="background:'+item.dot+';"></div>';
    h+='<div><div class="detail-text">'+item.text+'</div>';
    if(item.sub) h+='<div class="detail-sub">'+item.sub+'</div>';
    h+='</div></div>';
  });
  h+='</div></div>';
  return h;
}

function setTab(tab){
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.getAttribute('onclick').indexOf("'"+tab+"'")>=0);
  });
  document.getElementById('legend').innerHTML=renderLegend(tab);
  document.getElementById('summary-wrap').innerHTML=summaryHTML[tab]||'';
  var grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  [5,6,7,8].forEach(function(m){ grid.innerHTML+=renderMonth(2026,m,tab); });
  document.getElementById('detail-wrap').innerHTML=renderDetail(tab);
}

setTab('all');
