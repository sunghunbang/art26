<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026학년도 방과후학교 강사 만족도 조사 | 충남예술고등학교</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',Apple SD Gothic Neo,sans-serif;background:#f4f6f9;color:#222;min-height:100vh}
  header{background:#1a5276;color:#fff;padding:28px 20px 24px;text-align:center}
  header h1{font-size:1.35rem;font-weight:700;letter-spacing:-0.01em;margin-bottom:6px}
  header p{font-size:0.85rem;opacity:0.8}
  .notice{background:#ebf5fb;border-left:4px solid #2e86c1;margin:20px auto;max-width:820px;padding:14px 18px;border-radius:0 8px 8px 0;font-size:0.84rem;line-height:1.7;color:#1a5276}
  .notice strong{font-weight:700}
  .step-row{display:flex;gap:10px;max-width:820px;margin:0 auto 24px;padding:0 16px;flex-wrap:wrap}
  .step{flex:1;min-width:160px;background:#fff;border-radius:10px;border:1px solid #dce6ef;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
  .step-num{width:24px;height:24px;border-radius:50%;background:#2e86c1;color:#fff;font-size:0.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .step-text{font-size:0.82rem;line-height:1.5;color:#333}
  .step-text strong{display:block;font-weight:700;margin-bottom:2px;color:#1a5276}
  .section{max-width:820px;margin:0 auto 28px;padding:0 16px}
  .section-title{font-size:0.78rem;font-weight:700;color:#7f8c9a;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #dce6ef}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}

  /* 공통 카드 */
  .card{background:#fff;border:1.5px solid #dce6ef;border-radius:14px;padding:18px 12px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none;color:inherit;transition:border-color .15s,box-shadow .15s,transform .1s;cursor:pointer}
  .card:hover{box-shadow:0 4px 14px rgba(0,0,0,0.10);transform:translateY(-2px)}
  .avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800}
  .card-name{font-size:15px;font-weight:800;text-align:center;color:#1a2533;line-height:1.3;margin-top:2px}
  .card-sub{font-size:13px;font-weight:700;text-align:center;line-height:1.4}
  .card-btn{margin-top:5px;font-size:11px;padding:5px 14px;border-radius:20px;font-weight:700;transition:all .15s}

  /* ── 전공별 색상 테마 ── */

  /* 디자인 : 파랑 */
  .major-design{border-color:#bfdbfe}
  .major-design .avatar{background:#dbeafe;color:#1d4ed8}
  .major-design .card-sub{color:#1d4ed8}
  .major-design .card-btn{background:#eff6ff;color:#1d4ed8;border:1.5px solid #bfdbfe}
  .major-design:hover{border-color:#1d4ed8;box-shadow:0 4px 14px rgba(29,78,216,0.15)}
  .major-design:hover .card-btn{background:#1d4ed8;color:#fff;border-color:#1d4ed8}

  /* 서양화 : 에메랄드 */
  .major-western{border-color:#a7f3d0}
  .major-western .avatar{background:#d1fae5;color:#065f46}
  .major-western .card-sub{color:#047857}
  .major-western .card-btn{background:#ecfdf5;color:#047857;border:1.5px solid #a7f3d0}
  .major-western:hover{border-color:#047857;box-shadow:0 4px 14px rgba(4,120,87,0.15)}
  .major-western:hover .card-btn{background:#047857;color:#fff;border-color:#047857}

  /* 조소 : 주황 */
  .major-sculpture{border-color:#fed7aa}
  .major-sculpture .avatar{background:#ffedd5;color:#c2410c}
  .major-sculpture .card-sub{color:#c2410c}
  .major-sculpture .card-btn{background:#fff7ed;color:#c2410c;border:1.5px solid #fed7aa}
  .major-sculpture:hover{border-color:#c2410c;box-shadow:0 4px 14px rgba(194,65,12,0.15)}
  .major-sculpture:hover .card-btn{background:#c2410c;color:#fff;border-color:#c2410c}

  /* 한국화 : 보라 */
  .major-korean{border-color:#e9d5ff}
  .major-korean .avatar{background:#f3e8ff;color:#7e22ce}
  .major-korean .card-sub{color:#7e22ce}
  .major-korean .card-btn{background:#faf5ff;color:#7e22ce;border:1.5px solid #e9d5ff}
  .major-korean:hover{border-color:#7e22ce;box-shadow:0 4px 14px rgba(126,34,206,0.15)}
  .major-korean:hover .card-btn{background:#7e22ce;color:#fff;border-color:#7e22ce}

  /* 드로잉 : 분홍 */
  .major-drawing{border-color:#fbcfe8}
  .major-drawing .avatar{background:#fce7f3;color:#be185d}
  .major-drawing .card-sub{color:#be185d}
  .major-drawing .card-btn{background:#fdf2f8;color:#be185d;border:1.5px solid #fbcfe8}
  .major-drawing:hover{border-color:#be185d;box-shadow:0 4px 14px rgba(190,24,93,0.15)}
  .major-drawing:hover .card-btn{background:#be185d;color:#fff;border-color:#be185d}

  footer{text-align:center;padding:28px 16px;font-size:0.78rem;color:#aaa;border-top:1px solid #e0e6ec;margin-top:8px}
</style>
</head>
<body>

<header>
  <h1>2026학년도 방과후학교 강사 만족도 조사</h1>
  <p>충남예술고등학교 미술교육부</p>
</header>

<div style="max-width:820px;margin:20px auto 16px;padding:0 16px">
  <div class="notice">
    📋 <strong>설문 목적:</strong> 방과후 강사 운영 및 강사 재계약을 위한 기초자료로 활용됩니다.<br>
    🔒 <strong>비밀 보장:</strong> 응답 내용은 담당교사 외 비공개를 원칙으로 하며, 철저히 비밀이 보장됩니다.
  </div>
</div>

<div style="max-width:820px;margin:0 auto 24px;padding:0 16px">
  <div class="step-row" style="margin:0;padding:0">
    <div class="step"><div class="step-num">1</div><div class="step-text"><strong>강사 찾기</strong>아래에서 내 강사 확인</div></div>
    <div class="step"><div class="step-num">2</div><div class="step-text"><strong>배너 클릭</strong>해당 강사 버튼 클릭</div></div>
    <div class="step"><div class="step-num">3</div><div class="step-text"><strong>설문 작성</strong>구글폼에서 응답 제출</div></div>
  </div>
</div>

<!-- 전공 범례 -->
<div style="max-width:820px;margin:0 auto 20px;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap">
  <span style="font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;background:#dbeafe;color:#1d4ed8">■ 디자인</span>
  <span style="font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;background:#d1fae5;color:#047857">■ 서양화</span>
  <span style="font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;background:#ffedd5;color:#c2410c">■ 조소</span>
  <span style="font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;background:#f3e8ff;color:#7e22ce">■ 한국화</span>
  <span style="font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;background:#fce7f3;color:#be185d">■ 드로잉</span>
</div>

<script>
const BASE = "https://docs.google.com/forms/d/e/1FAIpQLSe5daqgOtMvspcO6WE8YB8DiEMpeJ8cuaMgRygEEH6JOqc29g/viewform";
const ENTRY = "entry.392076014";
function link(name){ return BASE + "?usp=pp_url&" + ENTRY + "=" + encodeURIComponent(name); }

function majorClass(sub){
  if(sub.includes("디자인")) return "major-design";
  if(sub.includes("서양화")) return "major-western";
  if(sub.includes("조소"))   return "major-sculpture";
  if(sub.includes("한국화")) return "major-korean";
  if(sub.includes("드로잉")) return "major-drawing";
  return "major-design";
}
function initials(name){ return name[0]; }
</script>

<!-- 1학년 -->
<div class="section">
  <div class="section-title">1학년</div>
  <div class="grid" id="g1"></div>
</div>
<!-- 2학년 -->
<div class="section">
  <div class="section-title">2학년</div>
  <div class="grid" id="g2"></div>
</div>
<!-- 3학년 -->
<div class="section">
  <div class="section-title">3학년</div>
  <div class="grid" id="g3"></div>
</div>
<!-- 드로잉 -->
<div class="section">
  <div class="section-title">드로잉</div>
  <div class="grid" id="gd"></div>
</div>

<footer>충남예술고등학교 미술교육부 · 2026학년도 방과후학교</footer>

<script>
const instructors = {
  g1: [
    { name:"김지혜", sub:"1학년 디자인", val:"1학년 디자인 - 김지혜" },
    { name:"최이진", sub:"1학년 디자인", val:"1학년 디자인 - 최이진" },
    { name:"신재욱", sub:"1학년 서양화", val:"1학년 서양화 -신재욱" },
    { name:"김두나", sub:"1학년 서양화", val:"1학년 서양화-김두나" },
    { name:"민수진", sub:"1학년 조소",   val:"1학년 조소- 민수진" },
    { name:"남연지", sub:"1학년 조소",   val:"1학년 조소- 남연지" },
    { name:"이대호", sub:"1학년 한국화", val:"1학년 한국화- 이대호" },
  ],
  g2: [
    { name:"최문석", sub:"2학년 디자인", val:"2학년 디자인 -최문석" },
    { name:"윤지윤", sub:"2학년 디자인", val:"2학년 디자인- 윤지윤" },
    { name:"박유빈", sub:"2학년 디자인", val:"2학년 디자인- 박유빈" },
    { name:"방난영", sub:"2학년 디자인", val:"2학년 디자인- 방난영" },
    { name:"김지혜", sub:"2학년 디자인", val:"2학년 디자인- 김지혜" },
    { name:"이정용", sub:"2학년 서양화", val:"2학년 서양화- 이정용" },
    { name:"권혜연", sub:"2학년 서양화", val:"2학년 서양화-권혜연" },
    { name:"조경연", sub:"2학년 조소",   val:"2학년 조소- 조경연" },
    { name:"김현민", sub:"2학년 조소",   val:"2학년 조소- 김현민" },
    { name:"권영찬", sub:"2학년 한국화", val:"2학년 한국화- 권영찬" },
    { name:"김준기", sub:"2학년 한국화", val:"2학년 한국화- 김준기" },
  ],
  g3: [
    { name:"임정은", sub:"3학년 서양화", val:"3학년 서양화- 임정은" },
    { name:"이현아", sub:"3학년 서양화", val:"3학년 서양화- 이현아" },
    { name:"조윤진", sub:"3학년 조소",   val:"3학년 조소- 조윤진" },
    { name:"배영규", sub:"3학년 조소",   val:"3학년 조소-배영규" },
    { name:"진민규", sub:"3학년 한국화", val:"3학년 한국화- 진민규" },
    { name:"남여정", sub:"3학년 한국화", val:"3학년 한국화-남여정" },
  ],
  gd: [
    { name:"이정연", sub:"드로잉", val:"드로잉 - 이정연" },
    { name:"임이혜", sub:"드로잉", val:"드로잉- 임이혜" },
    { name:"조은시", sub:"드로잉", val:"드로잉- 조은시" },
    { name:"이도경", sub:"드로잉", val:"드로잉- 이도경" },
  ]
};

Object.entries(instructors).forEach(([gid, list]) => {
  const grid = document.getElementById(gid);
  list.forEach(p => {
    const mc = majorClass(p.sub);
    const a = document.createElement('a');
    a.className = 'card ' + mc;
    a.href = link(p.val);
    a.target = '_blank';
    a.innerHTML = `
      <div class="avatar">${initials(p.name)}</div>
      <div class="card-name">${p.name} 강사</div>
      <div class="card-sub">${p.sub}</div>
      <div class="card-btn">설문 참여 →</div>
    `;
    grid.appendChild(a);
  });
});
</script>
</body>
</html>
