<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미술전공 방과후 운영 일정 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f5f5f0;
    padding: 24px 16px;
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  h1 {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1.5px solid #ddd;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .legend span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    border-radius: 4px;
    padding: 3px 8px;
    border: 0.5px solid;
  }

  .summary {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .summary-box {
    flex: 1;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    border: 0.5px solid;
  }
  .summary-box .title { font-weight: 600; margin-bottom: 3px; }

  .cal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .month-box {
    background: #fff;
    border: 0.5px solid #ddd;
    border-radius: 10px;
    overflow: hidden;
  }
  .month-header {
    padding: 8px 12px;
    border-bottom: 0.5px solid #ddd;
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
  }
  .day-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 0.5px solid #eee;
  }
  .day-label {
    text-align: center;
    padding: 4px 1px;
    font-size: 10px;
    color: #888;
  }
  .day-label.sat { color: #378ADD; }
  .day-label.sun { color: #E24B4A; }
  .cells {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .cell {
    padding: 3px 2px;
    min-height: 48px;
    border: 0.5px solid #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .cell.empty { opacity: 0.15; background: #f9f9f9; }
  .cell .num {
    font-size: 11px;
    line-height: 1.4;
    color: #1a1a1a;
  }
  .cell .num.sat { color: #378ADD; }
  .cell .num.sun { color: #E24B4A; }
  .cell .num.bold { font-weight: 600; }
  .cell .lbl {
    font-size: 8.5px;
    text-align: center;
    line-height: 1.2;
    margin-top: 2px;
    word-break: keep-all;
    letter-spacing: -0.2px;
  }

  /* color types */
  .t-holiday { background: #FCEBEB; border-color: #F09595 !important; }
  .t-holiday .num, .t-holiday .lbl { color: #993C1D; }
  .t-closure { background: #FAEEDA; border-color: #EF9F27 !important; }
  .t-closure .num, .t-closure .lbl { color: #854F0B; }
  .t-exam { background: #EEEDFE; border-color: #AFA9EC !important; }
  .t-exam .num, .t-exam .lbl { color: #534AB7; }
  .t-exam2 { background: #D8D5FB; border-color: #8B84E8 !important; }
  .t-exam2 .num, .t-exam2 .lbl { color: #2D24A0; font-weight: 600; }
  .t-partial { background: #E6F1FB; border-color: #85B7EB !important; }
  .t-partial .num, .t-partial .lbl { color: #185FA5; }
  .t-range1 { background: #EAF3DE; border-color: #C0DD97 !important; }
  .t-range1 .num, .t-range1 .lbl { color: #3B6D11; }
  .t-range2 { background: #E1F5EE; border-color: #9FE1CB !important; }
  .t-range2 .num, .t-range2 .lbl { color: #0F6E56; }
  .t-start1 { background: #3B6D11; border-color: #3B6D11 !important; }
  .t-start1 .num, .t-start1 .lbl { color: #fff; font-weight: 600; }
  .t-end1 { background: #3B6D11; border-color: #3B6D11 !important; }
  .t-end1 .num, .t-end1 .lbl { color: #fff; font-weight: 600; }
  .t-start2 { background: #085041; border-color: #085041 !important; }
  .t-start2 .num, .t-start2 .lbl { color: #fff; font-weight: 600; }
  .t-end2 { background: #085041; border-color: #085041 !important; }
  .t-end2 .num, .t-end2 .lbl { color: #fff; font-weight: 600; }

  @media (max-width: 500px) {
    .cal-grid { grid-template-columns: 1fr; }
    .summary { flex-direction: column; }
  }

  .footer {
    margin-top: 14px;
    font-size: 10px;
    color: #aaa;
    text-align: right;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>미술전공 방과후 운영 일정 — 2026년 5~8월</h1>

  <div class="legend">
    <span style="background:#FCEBEB;color:#993C1D;border-color:#F09595;">공휴일·법정휴무</span>
    <span style="background:#FAEEDA;color:#854F0B;border-color:#EF9F27;">학교행사·재량휴무</span>
    <span style="background:#EEEDFE;color:#534AB7;border-color:#AFA9EC;">시험주간</span>
    <span style="background:#D8D5FB;color:#2D24A0;border-color:#8B84E8;">시험일</span>
    <span style="background:#E6F1FB;color:#185FA5;border-color:#85B7EB;">부분운영</span>
    <span style="background:#EAF3DE;color:#3B6D11;border-color:#97C459;">방과후 운영</span>
    <span style="background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5;">방학중 방과후</span>
    <span style="background:#3B6D11;color:#fff;border-color:#3B6D11;">시작·종료일</span>
  </div>

  <div class="summary">
    <div class="summary-box" style="background:#EAF3DE;border-color:#97C459;">
      <div class="title" style="color:#27500A;">▸ 1학기 2차 방과후</div>
      <div style="color:#3B6D11;">5.6(수) ~ 7.16(목) · 약 72일</div>
    </div>
    <div class="summary-box" style="background:#E1F5EE;border-color:#5DCAA5;">
      <div class="title" style="color:#085041;">▸ 방학중 미술방과후 (예정)</div>
      <div style="color:#0F6E56;">7.27(월) ~ 8.14(금) · 15일 · 1일 7시간</div>
    </div>
  </div>

  <div class="cal-grid" id="cal-grid"></div>
  <div class="footer">충남예술고등학교 미술교육부 · 2026</div>
</div>

<script>
const DAYS = ['월','화','수','목','금','토','일'];
const MONTHS = ['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

const events = {
  '2026-05-01':{type:'holiday',label:'노동절'},
  '2026-05-04':{type:'closure',label:'재량휴업'},
  '2026-05-05':{type:'holiday',label:'어린이날'},
  '2026-05-06':{type:'start1',label:'방과후 시작'},
  '2026-05-07':{type:'exam',label:'3학년 모의고사'},
  '2026-05-15':{type:'closure',label:'체육대회'},
  '2026-05-25':{type:'holiday',label:'대체공휴일'},
  '2026-06-03':{type:'holiday',label:'지방선거'},
  '2026-06-22':{type:'exam',label:'2회고사 주간'},
  '2026-06-23':{type:'exam',label:'2회고사 주간'},
  '2026-06-24':{type:'exam2',label:'2회고사'},
  '2026-06-25':{type:'exam2',label:'2회고사'},
  '2026-06-26':{type:'exam2',label:'2회고사'},
  '2026-07-07':{type:'partial',label:'1·2학년 휴강'},
  '2026-07-16':{type:'end1',label:'방과후 종료'},
  '2026-07-17':{type:'holiday',label:'제헌절'},
  '2026-07-21':{type:'closure',label:'방학식'},
  '2026-07-27':{type:'start2',label:'미술방과후 시작'},
  '2026-08-14':{type:'end2',label:'미술방과후 종료'},
};

function ds(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function getCellClass(key, dow){
  const ev = events[key];
  if(ev) return 't-'+ev.type;
  if(key>='2026-05-06'&&key<='2026-07-16') return 't-range1';
  if(key>='2026-07-27'&&key<='2026-08-14') return 't-range2';
  return '';
}

function renderMonth(y,m){
  let fd = new Date(y,m-1,1).getDay();
  fd = fd===0?6:fd-1;
  const dim = new Date(y,m,0).getDate();

  let h = `<div class="month-box">`;
  h += `<div class="month-header">${y}년 ${MONTHS[m]}</div>`;
  h += `<div class="day-labels">`;
  DAYS.forEach((d,i)=>{ h+=`<div class="day-label${i===5?' sat':i===6?' sun':''}">${d}</div>`; });
  h += `</div><div class="cells">`;

  for(let i=0;i<fd;i++) h+=`<div class="cell empty"></div>`;

  for(let d=1;d<=dim;d++){
    const key=ds(y,m,d);
    const dow=(fd+d-1)%7;
    const ev=events[key];
    const cls=getCellClass(key,dow);
    const isSat=dow===5, isSun=dow===6;
    const numCls=!cls?(isSat?'sat':isSun?'sun':''):'bold';
    const hasSpecialEvent=ev&&['holiday','closure','exam','exam2','partial','start1','end1','start2','end2'].includes(ev.type);
    const weekendBg=!hasSpecialEvent?(isSat?'background:#EEF5FC;':isSun?'background:#FEF0F0;':''):'';
    h+=`<div class="cell${cls?' '+cls:''}" style="${weekendBg}">`;
    h+=`<span class="num${numCls?' '+numCls:''}">${d}</span>`;
    if(ev) h+=`<span class="lbl">${ev.label}</span>`;
    h+=`</div>`;
  }

  const rem=(7-((fd+dim)%7))%7;
  for(let i=0;i<rem;i++) h+=`<div class="cell empty"></div>`;
  h+=`</div></div>`;
  return h;
}

const grid=document.getElementById('cal-grid');
[5,6,7,8].forEach(m=>{ grid.innerHTML+=renderMonth(2026,m); });
</script>
</body>
</html>
